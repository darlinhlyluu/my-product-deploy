services:
  - type: web
    name: production-ai-agent
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 8000
      - key: ENVIRONMENT
        value: production
      - key: AGENT_API_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: cache
          property: connectionString

  - type: redis
    name: cache
    ipAllowList: [] # internal connections only
